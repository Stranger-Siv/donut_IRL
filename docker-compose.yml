# Local MongoDB for development — use with MONGODB_URI from .env.example
# Start:  docker compose up -d
# Stop:   docker compose down
# Data persists in a Docker volume between restarts.
services:
  mongo:
    image: mongo:7
    container_name: donut-irl-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: donut_irl

volumes:
  mongo_data:
